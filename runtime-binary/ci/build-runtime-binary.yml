name: build-runtime-binary

# Build the patched Chromium binary on three platforms and publish
# archives to a GitHub Release. Triggered on tag push (vN.N.N) or
# manual dispatch.

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      flavor:
        description: 'release | debug'
        type: string
        default: 'release'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-22.04, platform: linux-x64,    runner: ubuntu-22.04 }
          - { os: macos-14,     platform: darwin-arm64, runner: macos-14 }
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 720
    steps:
      - uses: actions/checkout@v4

      - name: System dependencies (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y curl git python3 python3-pip lsb-release sudo

      - name: Bootstrap chromium source
        run: |
          ./runtime-binary/build/bootstrap.sh "$HOME/agentic-chromium"

      - name: Build
        run: |
          ./runtime-binary/build/build.sh "$HOME/agentic-chromium/src" ${{ inputs.flavor || 'release' }}

      - name: Package
        run: |
          ./runtime-binary/build/package.sh "$HOME/agentic-chromium/src" out/Agentic

      - uses: actions/upload-artifact@v4
        with:
          name: agentic-browser-${{ matrix.platform }}
          path: runtime-binary/dist/*.tar.gz
          retention-days: 14

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.tar.gz
          generate_release_notes: true
